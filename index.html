<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake Game</title>
<style>
/* ===== Reset & Base ===== */
* { margin:0; padding:0; box-sizing:border-box; }

body{
  background:#0d0d0d;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'Segoe UI', Arial, sans-serif;
  color:#fff;
  user-select:none;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  padding:20px;
}

.title{
  font-size:32px;
  font-weight:800;
  color:#4ade80;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(74,222,128,0.5);
}

.hud{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }

.hud-box{
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:8px 24px;
  font-size:15px;
  color:#aaa;
  min-width:110px;
  text-align:center;
}

.hud-box span{ font-weight:700; font-size:18px; color:#4ade80; }

.canvas-wrapper{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  border:2px solid #2a2a2a;
  box-shadow:0 0 40px rgba(74,222,128,0.15);
  width:420px;
  height:420px;
  max-width:90vw;
  max-height:90vw;
}

canvas{
  display:block;
  background:#111;
  width:100%;
  height:100%;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
}

.overlay.hidden{ display:none; }

.overlay-content{
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:0 20px;
}

#overlay-title{
  font-size:32px;
  font-weight:800;
  color:#4ade80;
  text-shadow:0 0 20px rgba(74,222,128,0.5);
}

#overlay-sub{ font-size:16px; color:#888; }

#startBtn{
  margin-top:8px;
  padding:12px 36px;
  font-size:16px;
  font-weight:700;
  background:#16a34a;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:background 0.2s, transform 0.1s;
  letter-spacing:1px;
}

#startBtn:hover{ background:#15803d; transform:scale(1.05); }
#startBtn:active{ transform:scale(0.97); }

.controls-info{
  display:flex;
  gap:24px;
  font-size:13px;
  color:#555;
  flex-wrap:wrap;
  justify-content:center;
}

.controls-info span{
  background:#1a1a1a;
  border:1px solid #252525;
  border-radius:8px;
  padding:5px 14px;
}
</style>
</head>
<body>

  <div class="container">
    <h1 class="title">🐍 Snake Game</h1>

    <div class="hud">
      <div class="hud-box">Score: <span id="score">0</span></div>
      <div class="hud-box">Best: <span id="highscore">0</span></div>
      <div class="hud-box">Level: <span id="level">1</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="420" height="420"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <p id="overlay-title">Snake Game</p>
          <p id="overlay-sub">Arrow keys se khelo</p>
          <button id="startBtn">▶ Start Game</button>
        </div>
      </div>
    </div>

    <div class="controls-info">
      <span>⬆⬇⬅➡ Move</span>
      <span>Space = Pause</span>
      <span>R = Restart</span>
    </div>
  </div>

<script>
// ===== Canvas Setup =====
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const GRID = 21;
const COLS = 20;
const ROWS = 20;

// ===== Game State =====
let snake, dir, nextDir, food, score, highScore = 0, level, speed;
let gameRunning = false;
let paused      = false;
let animId      = null;
let lastTime    = 0;
let particles   = [];
let foodPulse   = 0;

// ===== DOM =====
const scoreEl      = document.getElementById('score');
const highScoreEl  = document.getElementById('highscore');
const levelEl      = document.getElementById('level');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub   = document.getElementById('overlay-sub');
const startBtn     = document.getElementById('startBtn');

// ===== Init =====
function initGame(){
  snake   = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  score   = 0;
  level   = 1;
  speed   = 150;
  particles = [];
  foodPulse = 0;
  updateHUD();
  placeFood();
}

function updateHUD(){
  scoreEl.textContent     = score;
  highScoreEl.textContent = highScore;
  levelEl.textContent     = level;
}

function placeFood(){
  let pos;
  do{
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while(snake.some(s=>s.x===pos.x && s.y===pos.y));
  food = pos;
  foodPulse = 0;
}

function spawnParticles(gx, gy){
  for(let i=0;i<10;i++){
    const angle = Math.random()*Math.PI*2;
    const sp    = 1.5 + Math.random()*2.5;
    particles.push({
      x: gx*GRID + GRID/2,
      y: gy*GRID + GRID/2,
      vx: Math.cos(angle)*sp,
      vy: Math.sin(angle)*sp,
      life: 1,
      color: Math.random()>0.5 ? '#fbbf24' : '#f87171'
    });
  }
}

function updateParticles(){
  particles = particles.filter(p=>p.life>0.05);
  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.055;
  });
}

function update(){
  dir = {...nextDir};

  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

  if(head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS){ endGame(); return; }

  for(let i=0;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){ endGame(); return; }
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    if(score>highScore) highScore = score;
    spawnParticles(food.x, food.y);
    placeFood();
    if(score%5===0){
      level++;
      speed = Math.max(60, speed-12);
    }
    updateHUD();
  } else {
    snake.pop();
  }

  foodPulse += 0.12;
}

function drawBackground(){
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for(let i=0;i<=COLS;i++){
    ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,canvas.height); ctx.stroke();
  }
  for(let j=0;j<=ROWS;j++){
    ctx.beginPath(); ctx.moveTo(0,j*GRID); ctx.lineTo(canvas.width,j*GRID); ctx.stroke();
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawSnake(){
  const len = snake.length;

  for(let i=len-1;i>=0;i--){
    const seg = snake[i];
    const px  = seg.x*GRID;
    const py  = seg.y*GRID;
    const pad = 1.5;
    const size = GRID - pad*2;

    const t = i/len;
    if(i===0){
      ctx.fillStyle = '#16a34a';
    } else {
      const g = Math.round(180 - t*80);
      ctx.fillStyle = `rgb(22, ${g}, 74)`;
    }

    const r = i===0 ? 8 : i===len-1 ? 3 : 6;
    roundRect(px+pad, py+pad, size, size, r);
    ctx.fill();

    if(i>0 && i<len-1){
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.beginPath();
      ctx.arc(px+GRID*0.3, py+GRID*0.3, GRID*0.18, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Head details
  const hx = snake[0].x*GRID;
  const hy = snake[0].y*GRID;

  let eye1, eye2;
  if(dir.x===1)       { eye1=[hx+15,hy+5]; eye2=[hx+15,hy+15]; }
  else if(dir.x===-1) { eye1=[hx+5,hy+5];  eye2=[hx+5,hy+15];  }
  else if(dir.y===-1) { eye1=[hx+5,hy+5];  eye2=[hx+15,hy+5];  }
  else                { eye1=[hx+5,hy+15]; eye2=[hx+15,hy+15]; }

  [eye1, eye2].forEach(([ex,ey])=>{
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex,ey,3.8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(ex+dir.x*1.2, ey+dir.y*1.2, 2.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(ex+dir.x*0.5-0.8, ey+dir.y*0.5-0.8, 0.9, 0, Math.PI*2); ctx.fill();
  });

  if(dir.x!==0 || dir.y!==0){
    const tx = hx + GRID/2 + dir.x*(GRID/2+3);
    const ty = hy + GRID/2 + dir.y*(GRID/2+3);
    ctx.strokeStyle = '#f43f5e';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(hx+GRID/2+dir.x*(GRID/2-2), hy+GRID/2+dir.y*(GRID/2-2));
    ctx.lineTo(tx,ty);
    ctx.stroke();

    const forkLen = 4;
    const perpX = dir.y, perpY = -dir.x;
    ctx.beginPath();
    ctx.moveTo(tx,ty);
    ctx.lineTo(tx+dir.x*forkLen+perpX*forkLen, ty+dir.y*forkLen+perpY*forkLen);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx,ty);
    ctx.lineTo(tx+dir.x*forkLen-perpX*forkLen, ty+dir.y*forkLen-perpY*forkLen);
    ctx.stroke();
  }
}

function drawFood(){
  const cx = food.x*GRID + GRID/2;
  const cy = food.y*GRID + GRID/2;
  const pulse = Math.sin(foodPulse)*1.8;
  const r = GRID*0.38 + pulse*0.2;

  ctx.strokeStyle = 'rgba(239,68,68,0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx,cy,r+4,0,Math.PI*2); ctx.stroke();

  ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.beginPath(); ctx.arc(cx-2.5,cy-2.5,r*0.32,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#15803d';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx,cy-r);
  ctx.quadraticCurveTo(cx+5,cy-r-7,cx+6,cy-r-5);
  ctx.stroke();

  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.ellipse(cx+5,cy-r-4,4,2,Math.PI/4,0,Math.PI*2);
  ctx.fill();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3.5*p.life,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function draw(){
  drawBackground();
  drawFood();
  drawSnake();
  drawParticles();
}

function gameLoop(timestamp){
  if(!paused){
    if(timestamp - lastTime >= speed){
      lastTime = timestamp;
      update();
    }
    updateParticles();
    draw();
  }
  if(gameRunning) animId = requestAnimationFrame(gameLoop);
}

function startGame(){
  initGame();
  gameRunning = true;
  paused = false;
  lastTime = 0;
  overlay.classList.add('hidden');
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
}

function endGame(){
  gameRunning = false;
  cancelAnimationFrame(animId);
  overlayTitle.textContent = '💀 Game Over!';
  overlaySub.textContent = 'Score: ' + score;
  startBtn.textContent = '🔄 Play Again';
  overlay.classList.remove('hidden');
}

function togglePause(){
  if(!gameRunning) return;
  paused = !paused;
  if(paused){
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('⏸  Paused', canvas.width/2, canvas.height/2);
    ctx.font = '16px Segoe UI';
    ctx.fillStyle = '#888';
    ctx.fillText('Space dabao resume ke liye', canvas.width/2, canvas.height/2+36);
    ctx.textAlign = 'left';
  } else {
    lastTime = performance.now();
    animId = requestAnimationFrame(gameLoop);
  }
}

const keyMap = {
  ArrowUp:    {x:0,y:-1},
  ArrowDown:  {x:0,y:1},
  ArrowLeft:  {x:-1,y:0},
  ArrowRight: {x:1,y:0},
  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
};

document.addEventListener('keydown', (e)=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)){
    e.preventDefault();
  }
  if(e.key===' '){ togglePause(); return; }
  if(e.key==='r' || e.key==='R'){ startGame(); return; }

  const nd = keyMap[e.key];
  if(!nd) return;
  if(nd.x===-dir.x && nd.y===-dir.y) return;
  nextDir = nd;
});

startBtn.addEventListener('click', startGame);

// initial paint
dir = {x:1,y:0};
snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
food = {x:15,y:10};
draw();
</script>
</body>
</html>
